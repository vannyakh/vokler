services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vokler
      POSTGRES_PASSWORD: vokler
      POSTGRES_DB: vokler
    # Host 5433 avoids clashing with a local Postgres on 5432
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vokler -d vokler"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # One-shot: creates tables (Alembic). API/worker wait until this exits successfully.
  migrate:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "uv sync && uv run alembic upgrade head"
    environment:
      DATABASE_URL: postgresql+asyncpg://vokler:vokler@db:5432/vokler
    depends_on:
      db:
        condition: service_healthy

  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vokler:vokler@db:5432/vokler
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-change-me}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "uv sync && uv run arq app.workers.tasks.WorkerSettings"
    environment:
      DATABASE_URL: postgresql+asyncpg://vokler:vokler@db:5432/vokler
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
